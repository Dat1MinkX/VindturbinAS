<!DOCTYPE html>
<!-- Admin.html
    Administrasjonsgrensesnitt for brukere med Admin-rolle.
    Gir tilgang til oversikter og verktøy som kun admins skal bruke.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="/script/header-footer.js" defer></script> -->
    <link rel="stylesheet" href="/style/base.css">
    <link rel="icon" type="image/x-icon" href="/icon/icon.svg">
    <title>Admin</title>
</head>

<body>
    <main class="login-wrapper">
        <div class="login-card">

            <div class="profile-container">
                <!-- <img src="/image/_0221898.avif" alt="Profilbilde" class="profile-img"> -->
            </div>

            <form action="/login" method="POST" class="login-form">
                <div class="input-group">
                    <label for="brukernavn">Brukernavn</label>
                    <input id="brukernavn" name="brukernavn" type="text" required>
                </div>

                <div class="input-group">
                    <label for="passord">Passord</label>
                    <input id="passord" name="passord" type="password" required>
                </div>

                <button type="submit" class="btn-submit">Logg deg inn!</button>
            </form>

            <div class="register-link">
                <a href="/newUser">Ikke registrert? Lag en ny bruker!</a>
            </div>

        </div>
    </main>
</body>

</html>
